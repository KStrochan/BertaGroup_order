name: Fetch exact product images from internet

on:
  workflow_dispatch:
    inputs:
      section:
        description: Catalog section
        required: true
        default: all
        type: choice
        options: [all, Food, NONFood]
      limit:
        description: Maximum products checked in this run
        required: true
        default: "1000"
        type: string
      min_score:
        description: Exact-match threshold
        required: true
        default: "0.86"
        type: string
      retry_unmatched:
        description: Check previously unmatched products again
        required: true
        default: true
        type: boolean
      force:
        description: Re-download products that already have images
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: product-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

- name: Set up Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.12"
    cache: pip
    cache-dependency-path: requirements-images.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-images.txt

      - name: Search and optimize exact product images
        shell: bash
        run: |
          EXTRA_ARGS=()
          if [[ "${{ inputs.retry_unmatched }}" == "true" ]]; then
            EXTRA_ARGS+=(--retry-unmatched)
          fi
          if [[ "${{ inputs.force }}" == "true" ]]; then
            EXTRA_ARGS+=(--force)
          fi

          python tools/fetch_product_images.py \
            --section "${{ inputs.section }}" \
            --limit "${{ inputs.limit }}" \
            --min-score "${{ inputs.min_score }}" \
            --providers "openfacts,duckduckgo,bing" \
            --sleep 0.55 \
            "${EXTRA_ARGS[@]}" || true

      - name: Upload result archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: berta-product-images-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            public/images/products
            public/data/products.json
            public/data/image-fetch-state.json
            public/data/image-attribution.json
            reports/product-image-report.csv

      - name: Commit images and catalog links
        shell: bash
        run: |
          if git diff --quiet && [[ -z "$(git status --porcelain)" ]]; then
            echo "No verified new images were found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A public/data public/images/products reports
          git commit -m "Add exact product images"
          git push
